<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Final Project — Task Manager</title>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header style="text-align:center; padding:2rem;">
    <h1>📝 Task Manager App</h1>
    <p>Organize your tasks with localStorage + JS</p>
  </header>

  <main style="max-width:600px; margin:auto; font-family:system-ui;">

    <!-- INPUT SECTION -->
    <section style="margin-bottom:2rem;">
      <input id="task-input" type="text" placeholder="Enter a task..." style="padding:10px; width:70%;">
      <button id="add-btn">Add</button>
    </section>

    <!-- TASK LIST -->
    <section>
      <ul id="task-list" style="list-style:none; padding:0;"></ul>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
